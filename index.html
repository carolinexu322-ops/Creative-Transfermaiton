<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f3ef;min-height:100vh;padding:2rem 1rem;display:flex;justify-content:center}
#app{width:100%;max-width:600px}

.model-hdr{padding:.65rem 1rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee}

.model-codes{font-size:11px;color:#aaa;font-family:monospace}

// Sub-dimension metadata
const DIMS={
  S1:{model:'S',name:'Self-Esteem & Confidence',max:6},
  S2:{model:'S',name:'Self-Clarity',max:4},
  S3:{model:'S',name:'Core Values',max:2},
  E1:{model:'E',name:'Attachment Security',max:6},
  E2:{model:'E',name:'Emotional Investment',max:4},
  E3:{model:'E',name:'Boundaries & Dependency',max:4},
  A1:{model:'A',name:'Worldview Tendency',max:4},
  A2:{model:'A',name:'Rules & Flexibility',max:2},
  A3:{model:'A',name:'Sense of Purpose',max:4},
  Ac1:{model:'Ac',name:'Motivation Orientation',max:4},
  Ac2:{model:'Ac',name:'Decision Style',max:6},
  Ac3:{model:'Ac',name:'Execution Mode',max:4},
  So1:{model:'So',name:'Social Initiative',max:4},
  So2:{model:'So',name:'Interpersonal Boundaries',max:4},
  So3:{model:'So',name:'Expression & Authenticity',max:2},
};

const MODELS=[
  {code:'S', label:'Self model',dims:['S1','S2','S3'],color:'#534AB7',bg:'#EEEDFE'},
  {code:'E', label:'Emotional model',dims:['E1','E2','E3'],color:'#993C1D',bg:'#FAECE7'},
  {code:'A', label:'Attitude model',dims:['A1','A2','A3'],color:'#0F6E56',bg:'#E1F5EE'},
  {code:'Ac',label:'Action Drive model',dims:['Ac1','Ac2','Ac3'],color:'#854F0B',bg:'#FAEEDA'},
  {code:'So',label:'Social model',dims:['So1','So2','So3'],color:'#185FA5',bg:'#E6F1FB'},
];

// Compute sub-dimension level
function dimLvl(ratio){return ratio>=0.67?'H':ratio>=0.33?'M':'L';}

// Compute 3 final dimensions from 15 sub-dims
// Self = S model, Drive = A+Ac models, Connect = E+So models
function computeDims(raw){
  const r={};
  Object.keys(DIMS).forEach(k=>{
    const mx=DIMS[k].max;
    r[k]={raw:raw[k]||0,max:mx,ratio:(raw[k]||0)/mx,lv:dimLvl((raw[k]||0)/mx)};
  });
  // Model ratios
  const mRatio=(codes)=>{
    let s=0,m=0;
    codes.forEach(c=>{s+=r[c].raw;m+=r[c].max;});
    return s/m;
  };
  const selfR=mRatio(['S1','S2','S3']);
  const driveR=(mRatio(['A1','A2','A3'])+mRatio(['Ac1','Ac2','Ac3']))/2;
  const connectR=(mRatio(['E1','E2','E3'])+mRatio(['So1','So2','So3']))/2;
  return{dimScores:r,selfR,driveR,connectR,
    S:dimLvl(selfR),D:dimLvl(driveR),C:dimLvl(connectR)};
}

  MHL:{code:'POOR',name:'The Laser-Focused Minimalist',tag:'I\'m broke, but I\'m laser-focused.',desc:'This "poverty" isn\'t a bank statement — it\'s resource reallocation after a desire declutter. While everyone else sprinkles energy like confetti, POOR compresses theirs into a laser beam. Parties, vanity, networking? Sorry, no time. Not resource-poor — pouring all resources into one deep well that LOOKS like poverty but is actually a gold mine.'},

function showIntro(){
  el.innerHTML=`<div class="card">
    <p class="label">SBTI ENGLISH EDITION · 31 QUESTIONS · ~5 MIN</p>
    <h1 style="margin:.3rem 0 1rem">Find your personality type</h1>
    <p class="desc">A faithful English translation of <strong>sbti.ai</strong>. This version scores all <strong>15 sub-dimensions</strong> across 5 models, then shows you a full dimension portrait alongside your result.</p>
    <p class="note">For entertainment only. Questions appear in order. You can go back and change answers.</p>
    <div style="margin-top:1.5rem"><button class="btn-g" onclick="start()">Start the test →</button></div>
  </div>`;
}

function start(){st.screen='quiz';st.cur=0;render();}

function showQuiz(){
  const q=QS[st.cur];
  const pct=Math.round((st.cur/QS.length)*100);
  const sup=q.d==='X';
  const sel=st.ans[st.cur];
  const labs=['A','B','C','D'];
  const dimInfo=sup?null:DIMS[q.d];
  el.innerHTML=`<div class="card">
    <div class="pmeta"><span>Question ${q.n} of ${QS.length}</span><span>${pct}%</span></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div style="margin-top:1.25rem">
      <span class="qtag ${sup?'qtag-sup':'qtag-dim'}">${sup?'Supplementary — no effect':'Dimension: hidden'}</span>
    </div>
    <p class="qtext">${q.t}</p>
    <div>
      ${q.o.map((o,i)=>`<button class="opt${sel===i?' sel':''}" onclick="pick(${i})"><span class="ol">${labs[i]}</span>${o.l}</button>`).join('')}
    </div>
    <div class="nav">
      <button class="btn-o" onclick="prev()" ${st.cur===0?'disabled':''}>← Previous</button>
      <button class="btn-g" onclick="next()" ${sel===null?'disabled':''}>${st.cur+1<QS.length?'Next →':'See my result →'}</button>
    </div>
  </div>`;
}

function pick(i){st.ans[st.cur]=i;render();}
function prev(){if(st.cur>0){st.cur--;render();}}
function next(){
  if(st.ans[st.cur]===null)return;
  if(st.cur+1<QS.length){st.cur++;render();}
  else calc();
}

function calc(){
  const raw={};
  Object.keys(DIMS).forEach(k=>raw[k]=0);
  QS.forEach((q,qi)=>{
    if(q.d==='X')return;
    const ai=st.ans[qi];
    if(ai===null)return;
    raw[q.d]=(raw[q.d]||0)+q.o[ai].v;
  });
  const dims=computeDims(raw);
  const key=dims.S+dims.D+dims.C;
  st.result={dims,t:TYPES[key]||TYPES['MMM'],key};
  st.screen='result';
  render();
}

function computeDims(raw){
  const r={};
  Object.keys(DIMS).forEach(k=>{
    const mx=DIMS[k].max;
    const rv=raw[k]||0;
    r[k]={raw:rv,max:mx,ratio:rv/mx,lv:dimLvl(rv/mx)};
  });
  const mRatio=(codes)=>{let s=0,m=0;codes.forEach(c=>{s+=r[c].raw;m+=r[c].max;});return s/m;};
  const selfR=mRatio(['S1','S2','S3']);
  const driveR=(mRatio(['A1','A2','A3'])+mRatio(['Ac1','Ac2','Ac3']))/2;
  const connectR=(mRatio(['E1','E2','E3'])+mRatio(['So1','So2','So3']))/2;
  return{d:r,selfR,driveR,connectR,S:dimLvl(selfR),D:dimLvl(driveR),C:dimLvl(connectR)};
}

function lvlColor(lv){return lv==='H'?'#e6f2eb':lv==='M'?'#faeeda':'#FAECE7';}
function lvlText(lv){return lv==='H'?'#1a5c30':lv==='M'?'#854F0B':'#712B13';}
function lvlWord(lv){return lv==='H'?'High':lv==='M'?'Medium':'Low';}

function showResult(){
  const {dims,t,key}=st.result;
  const lMap={H:'High',M:'Medium',L:'Low'};

  // Main result card
  let html=`<div class="card">
    <p class="label">YOUR TYPE</p>

    </div>

      ${['S','D','C'].map((d,i)=>{
        const lv=[dims.S,dims.D,dims.C][i];
        const labels=['Self','Drive','Connect'];

  html+=`<div class="card">

  el.innerHTML=html;
}

render();
